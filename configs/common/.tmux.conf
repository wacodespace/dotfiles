# ~/.tmux.conf - 个人 Tmux 配置
# ============================================================

# --- 基础设置 ---
set-option -g status-keys vi
setw -g mode-keys vi
set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-window-option -g automatic-rename on
set-option -g set-titles on
set -g history-limit 100000
setw -g monitor-activity on

# --- 前缀键: C-a ---
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# --- 面板导航 (hjkl) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- 面板导航 (Alt+方向键) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 面板调整大小 ---
bind < resize-pane -L 7
bind > resize-pane -R 7
bind - resize-pane -D 7
bind + resize-pane -U 7

# --- 窗口切换 (Alt+h/l) ---
bind-key -n M-l next-window
bind-key -n M-h previous-window

# --- 鼠标支持 ---
set -g mouse on

# --- 状态栏 ---
set -g status-interval 1
set -g status-bg default
set -g status-fg blue
set -g status-justify centre
set -g status-left " #[fg=green]#S@#H #[default]"
set -g status-left-length 20
set -g status-right "#[fg=colour226]%Y-%m-%d %a %H:%M:%S %Z #[fg=default]"

# --- 分屏/新窗口保持当前路径 ---
bind '"' split-window -vc "#{pane_current_path}"
bind '%' split-window -hc "#{pane_current_path}"
bind 'c' new-window -c "#{pane_current_path}"

# --- Neovim 无缝导航 (vim-tmux-navigator) ---
# 检测当前 pane 是否运行 vim/nvim，如果是则把按键转发给 vim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# copy-mode 下也支持
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# --- Escape 延迟优化（避免 nvim 中 Esc 延迟）---
set -sg escape-time 10

# --- Focus events（nvim autoread 需要）---
set -g focus-events on

# vim: ft=conf
